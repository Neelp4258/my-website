<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dazzlo - Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #fff8dc, #ffd700);
      margin: 0;
      padding: 2rem;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .tab {
      padding: 1rem 2rem;
      background-color: #ffd700;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      color: #000;
    }

    .tab:hover {
      background-color: #e6c200;
    }

    h1 {
      text-align: center;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Explore Our Products</h1>
  <div class="tabs">
    <a href="headphones.html" target="_blank" class="tab">Headphones</a>
    <a href="clothes.html" target="_blank" class="tab">Clothes</a>
    <a href="shoes.html" target="_blank" class="tab">Shoes</a>
  </div>
</body>
</html>
